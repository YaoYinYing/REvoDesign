color_by_plddt:
  title: "Color by pLDDT"
  banner: "Color predicted protein structures by pLDDT values recorded in the B-factor column. Optionally align to a target model and chain."
  options:
    - name: "selection"
      type: str
      default: "all"
      reason: "The PyMOL selection of objects or residues to color."
    - name: "align_target"
      type: int
      default: 0
      reason: "Rank of target in selection (1-based). Set 0 to skip alignment."
    - name: "chain_to_align"
      type: str
      default: "A"
      reason: "Chain ID to align against."

real_sc:
  title: "Set Sidechain Representation"
  banner: "Set molecular representation focusing on sidechains or alpha carbon."
  options:
    - name: "selection"
      type: str
      default: "(all)"
      reason: "Atom selection to apply representation to."
    - name: "representation"
      type: str
      default: "lines"
      reason: "Representation style."
      choices: ["lines", "sticks", "spheres", "dots"]
    - name: "hydrogen"
      type: bool
      default: false
      reason: "Include hydrogen atoms in representation."

color_by_mutation:
  title: "Color by mutation"
  banner: "Highlight and color mutations using BLOSUM90 differences between two aligned proteins."
  options:
    - name: "obj1"
      type: str
      reason: "PyMOL object 1 to color."
      required: true
      choices_from: "REvoDesign.shortcuts.dialog_hooks:get_all_object_names"
    - name: "obj2"
      type: str
      reason: "PyMOL object 2 to color."
      required: true
      choices_from: "REvoDesign.shortcuts.dialog_hooks:get_all_object_names"
    - name: "waters"
      type: bool
      default: false
      reason: "Include waters in comparison."
    - name: "labels"
      type: bool
      default: false
      reason: "Display mutation labels."


load_b_factors:
  title: "Load B-factors"
  banner: "Load a custom B-factor file to a structure and visualize it."
  options:
    - name: mol
      type: str
      reason: "The PyMOL selection of the object to modify."
      choices_from: "REvoDesign.shortcuts.dialog_hooks:get_all_object_names"
    - name: chain_ids
      type: str
      default: "A"
      reason: "Chain identifiers to modify. Multiple chain IDs can be specified separated by commas."
    - name: keep_missing
      type: bool
      default: true
      reason: "Whether to keep residues with missing B-factor values as is (True) or set them to zero (False)."
    - name: source
      type: str
      reason: "Path to the B-factor source file."
      required: true
      source: File
      ext: Mutable;XvgGromacs
    #  for text labels
    - name: label_x
      type: str
      default: 
      reason: "Column label for the loaded B-factors, Position column. Leave empty to ignore it."
    - name: label_y
      type: str
      default: 
      reason: "Column label for the loaded B-factors, B-factor column. Leave empty to ignore it."

    # for numeric indexes
    - name: index_x
      type: int
      reason: "Column label for the loaded B-factors, Position column. Leave empty to use default 0."
    - name: index_y
      type: int
      reason: "Column index for the loaded B-factors, B-factor column. Leave empty to use default 1."
    
    - name: pos_slice
      type: str
      default: ""
      reason: "Position slice to load B-factors for (e.g., '10-50,60-80'). Leave empty to load all positions."
    # - name: offset
    #   type: int
    #   default: 0
    #   reason: "Offset to add to residue numbers when mapping B-factors."
    - name: palette_code
      reason: "Palette code for the color map."
      type: str
      default: rainbow
      choices_from: "REvoDesign.tools.pymol_utils:list_palettes"
    - name: do_rescale
      type: bool
      default: false
      reason: "Whether to rescale the B-factors to the custom range."
    - name: scale_min
      type: float
      default: 0
      reason: "Minimum value for scaling the B-factors."
      choices_from: range:0.0,10.0,0.1
    - name: scale_max
      type: float
      default: 10
      reason: "Maximum value for scaling the B-factors."
      choices_from: range:0.0,100.0,0.1
    - name: rescale_min
      type: float
      default: 0
      reason: "Minimum value for rescale the B-factors."
      choices_from: range:0.0,100.0,0.1
    - name: rescale_max
      type: float
      default: 50
      reason: "Maximum value for rescale the B-factors."
      choices_from: range:0.0,100.0,0.1

    - name: visual
      type: bool
      default: true
      reason: "Whether to create a visual representation of the B-factors after loading."
    - name: putty_transform_mode
      type: int
      default: 3
      reason: "Putty transform mode for visualizing the B-factors."
      choices_from: range:0,8
