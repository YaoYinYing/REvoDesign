wrapped_rosettaligand:
  title: "RosettaLigand"
  banner: "Perform RosettaLigand Docking"
  options:
    - name: "pdb"
      type: str
      reason: "Path to the PDB file"
      source: "File"
      required: true
      ext: "PDB_STRICT"
    - name: "ligand_params"
      type: str
      reason: "Path to the ligands (*.params) to be docked."
      source: "Files"
      required: true
      ext: "RosettaParams"
    - name: "nstruct"
      type: int
      default: 10
      reason: "Number of structures to be generated."
      required: true
    - name: "chain_id_for_dock"
      type: str
      default: "B"
      reason: "Chain ID for the docking."
      required: true
    - name: "save_dir"
      type: str
      default: ""
      reason: "Path to the directory to save the results."
      source: "Directory"
      required: true
    - name: "job_id"
      type: str
      default: "rosettaligand"
      reason: "Job ID for the docking."
      required: true
    - name: "cst"
      type: str
      reason: "Path to the constraint file."
      source: "File"
      required: false
    - name: "box_size"
      type: int
      default: 30
      reason: "Box size for the docking."
      required: true
    - name: "move_distance"
      type: float
      default: 0.5
      reason: "Move distance for the docking."
    - name: "gridwidth"
      type: int
      default: 45
      choices: [10, 90]
      reason: "Grid width for the docking."
    - name: "start_from_xyz_sele"
      type: str
      default: ""
      reason: "Startpoint selection from XYZ coordinates."
      choices_from: "REvoDesign.shortcuts.dialog_hooks.get_selections"

wrapped_pross:
  title: "PROSS design"
  banner: "Perform PROSS design"
  options:
    - name: "pdb"
      type: str
      reason: "Path to the PDB file"
      source: "File"
      required: true
      ext: "PDB_STRICT"
    - name: "pssm"
      type: str
      reason: "Path to the PSSM file."
      source: "File"
      required: true
      ext: "PSSM"
    - name: "res_to_fix"
      type: str
      default: "1A"
      reason: "Residue to fix. Default is 1A."
    - name: "res_to_restrict"
      type: str
      default: "1A"
      reason: "Residue to restrict. Default is 1A."
    - name: "nstruct_refine"
      type: int
      default: 4
      reason: "Number of structures to be generated in refinement."
      required: true
    - name: "save_dir"
      type: str
      default: "design/pross"
      reason: "Path to the directory to save the results."
      source: "Directory"
      required: true
    - name: "job_id"
      type: str
      default: "pross_design"
      reason: "Job ID for the PROSS design."
      required: true

wrapped_fast_relax:
  title: "FastRelax"
  banner: "Perform Rosetta FastRelax"
  options:
    - name: "pdb"
      type: str
      reason: "Path to the PDB file"
      source: "File"
      required: true
      ext: "PDB_STRICT"
    - name: "relax_script"
      type: str
      reason: "Name of the fastrelax script."
      choices_from: "REvoDesign.shortcuts.dialog_hooks.list_fastrelax_scripts"
      default: "MonomerRelax2019"
      required: true
    - name: "dualspace"
      type: bool
      default: false
      reason: "Whether to use dual space."
    - name: "default_repeats"
      type: int
      default: 3
      choices: [3, 100]
      reason: "Default number of repeats."
    - name: "nstruct"
      type: int
      reason: "Number of structures to be generated in relax."
      required: true
    - name: "save_dir"
      type: str
      default: "relaxed/fastrelax"
      reason: "Path to the directory to save the results."
      source: "Directory"
      required: true
    - name: "job_id"
      type: str
      default: "relaxed"
      reason: "Job ID for the FastRelax design."
      required: true
    - name: "ligand_params"
      type: str
      reason: "Path to the ligands (*.params) to be docked."
      source: "Files"
      ext: "RosettaParams"
    - name: "opts"
      type: str
      reason: "Other options for the FastRelax."

wrapped_relax_w_ca_constraints:
  title: "RelaxWithCaConstraints"
  banner: "Perform Rosetta Relax With Ca Constraints"
  options:
    - name: "pdb"
      type: str
      reason: "Path to the PDB file"
      source: "File"
      required: true
      ext: "PDB_STRICT"
    - name: "nstructs_per_round"
      type: int
      default: 1
      reason: "Number of structures to generate per round."
      choices: [1, 100]
      required: true
    - name: "ncycles"
      type: int
      default: 3
      reason: "Number of cycles to run."
      choices: [3, 100]
      required: true
    - name: "save_dir"
      type: str
      default: "relaxed"
      reason: "Path to the directory to save the results."
      source: "Directory"
      required: true
    - name: "job_id"
      type: str
      default: "relax_w_ca_constraints"
      reason: "Job ID for the FastRelax design."
      required: true
    - name: "ligand_params"
      type: str
      reason: "Path to the ligands (*.params) to be docked."
      source: "Files"
      ext: "RosettaParams"
    - name: "opts"
      type: str
      reason: "Other options for the FastRelax."
    - name: "load_to_preview"
      type: bool
      default: false
      reason: "Whether to load the results to preview."
