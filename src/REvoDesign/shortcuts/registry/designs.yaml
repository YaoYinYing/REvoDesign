pssm2csv:
  title: "PSSM to CSV"
  banner: "Convert a PSSM raw file to a CSV format for downstream processing."
  options:
    - name: "pssm"
      type: str
      default: ""
      reason: "Path to the PSSM raw file to be converted."
      required: true
      source: File

profile_pick_design:
  title: "Design with Profile"
  banner: "Run mutant design with profile"
  options:
    - name: "profile"
      type: str
      default: ""
      reason: "Profile path for design"
      required: true
      source: File
    - name: "profile_type"
      type: str
      default: "PSSM"
      reason: "Profile type"
      required: true
      choices_from: REvoDesign.driver.group_register:CallableGroupValues.list_all_profile_parsers
    - name: "prefer_lower_score"
      type: bool
      default: false
      reason: "Whether to prefer lower score. Useful for ddG design."
    - name: "keep_missing"
      type: bool
      default: true
      reason: "Keep X in the sequence"
    - name: "residue_range"
      type: str
      default: ""
      reason: "Residue range to be shown/designed (comma-separated digits or file path)."
      source: File
    - name: "view_highlight"
      type: str
      default: "orient"
      reason: "Whether to reorient view to highlight residues."
      choices: ["None", "center", "zoom", "orient"]
    - name: "view_highlight_nbr"
      type: int
      default: 6
      reason: "Number of neighboring residues to highlight."
      choices_from: range:0,20
