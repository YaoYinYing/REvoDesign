logger_level_setter:
  title: "Set Logger Level"
  banner: "Set the logger level"
  options:
    # - name: "level"
    #   type: str
    #   reason: "Level to set the logger to."
    #   choices: ["DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"]
    #   default: "INFO"
    #   required: true
    # - name: "channel"
    #   type: str
    #   reason: "Channel to set the logger to."
    #   choices: ['stdout','stderr','file','notebook']
    #   default: ""
    # - name: "apply_to_root_logger"
    #   type: bool
    #   default: true
    #   reason: "Whether to apply the logger to the root logger."
    - name: root
      type: str
      reason: "Root logger to set the logger to."
      choices_from: REvoDesign.logger.logger:list_all_logger_levels
      default_from: LAMBDA:REvoDesign.logger.logger:get_current_channel_level,root
    - name: stdout
      type: str
      reason: "STDOUT logger to set the logger to."
      choices_from: REvoDesign.logger.logger:list_all_logger_levels
      default_from: LAMBDA:REvoDesign.logger.logger:get_current_channel_level,stdout
    - name: stderr
      type: str
      reason: "STDERR logger to set the logger to."
      choices_from: REvoDesign.logger.logger:list_all_logger_levels
      default_from: LAMBDA:REvoDesign.logger.logger:get_current_channel_level,stderr
    - name: file
      type: str
      reason: "FILE logger to set the logger to."
      choices_from: REvoDesign.logger.logger:list_all_logger_levels
      default_from: LAMBDA:REvoDesign.logger.logger:get_current_channel_level,file
    - name: notebook
      type: str
      reason: "Notebook logger to set the logger to."
      choices_from: REvoDesign.logger.logger:list_all_logger_levels
      default_from: LAMBDA:REvoDesign.logger.logger:get_current_channel_level,notebook