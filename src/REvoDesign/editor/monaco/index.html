<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Editor</title>
    <script src="./vs/loader.js"></script>
    <style>
        html, body, #container {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        let currentFilePath = "";

        require.config({ paths: { 'vs': './vs' } });
        require(['vs/editor/editor.main'], function () {
            console.log('Monaco Editor initialized.');
            window.editor = monaco.editor.create(document.getElementById('container'), {
                value: '',
                language: 'python',
                theme: 'vs-dark',
                automaticLayout: true,
                lineNumbers: 'on',
                indentGuides: true
            });
        });

        async function loadFileContent(filePath) {
            currentFilePath = filePath;
            console.log("Loading file:", filePath);
            const response = await fetch(`/load_file?file_path=${encodeURIComponent(filePath)}`, {
                headers: { "Authorization": `Bearer ${SECRET_TOKEN}` }
            });
            if (response.ok) {
                const data = await response.json();
                if (window.editor) {
                    window.editor.setValue(data.content);
                }
            } else {
                console.error("Failed to load file content:", await response.text());
            }
        }

        async function saveFileContent() {
            if (!currentFilePath) {
                console.warn("No file is currently loaded.");
                return;
            }
            const content = window.editor.getValue();
            const response = await fetch(`/save_file`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${SECRET_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ file_path: currentFilePath, content: content })
            });
            if (response.ok) {
                console.log("File saved successfully.");
            } else {
                console.error("Failed to save file:", await response.text());
            }
        }

        window.loadFileContent = loadFileContent;
        window.saveFileContent = saveFileContent;
    </script>
</body>
</html>
