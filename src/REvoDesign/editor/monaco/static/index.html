<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Monaco Editor</title>
    <script src="/static/vs/loader.js"></script>
    <style>
        html, body, #container {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        .notification-container {
            position: fixed;
            right: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999; /* ensure it stays on top */
        }

        .notification {
            background: #333;
            color: #fff;
            padding: 10px 15px;
            border-radius: 4px;
            opacity: 0.9;
            transition: opacity 0.3s ease, transform 0.3s ease;
            font-size: 14px;
            max-width: 250px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .notification:hover {
            opacity: 1;
        }

        .notification-success {
            background: #28a745;
        }

        .notification-error {
            background: #dc3545;
        }

        .notification-info {
            background: #17a2b8;
        }

        .notification.fade-out {
            opacity: 0;
            transform: translateY(10px);
        }

    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        function showNotification(message, type = 'info') {
            // Create container if it doesn't exist
            let container = document.querySelector('.notification-container');
            if (!container) {
                container = document.createElement('div');
                container.classList.add('notification-container');
                document.body.appendChild(container);
            }

            // Create notification element
            const notification = document.createElement('div');
            notification.classList.add('notification', `notification-${type}`);
            notification.textContent = message;

            // Append notification
            container.appendChild(notification);

            // Fade out and remove after a few seconds
            setTimeout(() => {
                notification.classList.add('fade-out');
                notification.addEventListener('transitionend', () => {
                    notification.remove();
                    if (!container.hasChildNodes()) {
                        container.remove();
                    }
                });
            }, 3000);
        }

        // Function to determine the language based on file extension
        function getLanguageFromFileExtension(filePath) {
            const extension = filePath.split('.').pop().toLowerCase();
            const languageMap = {
                py: 'python',
                js: 'javascript',
                ts: 'typescript',
                html: 'html',
                css: 'css',
                json: 'json',
                md: 'markdown',
                c: 'c',
                cpp: 'cpp',
                java: 'java',
                rb: 'ruby',
                go: 'go',
                rs: 'rust',
                php: 'php',
                xml: 'xml',
                yaml: 'yaml',
                yml: 'yaml',
                txt: 'plaintext',
            };
            return languageMap[extension] || 'plaintext';
        }

        const serverUrl = `${window.location.origin}`;
        const urlParams = new URLSearchParams(window.location.search);
        const filePath = urlParams.get('file_path');
        const token = urlParams.get('token');

        if (!filePath) {
            alert('File path is required to load the editor.');
            throw new Error('File path parameter is missing.');
        }

        // Detect platform for hotkey handling
        const isMacOS = navigator.platform.toUpperCase().includes('MAC');

        // Load Monaco Editor
        require.config({ paths: { 'vs': '/static/vs' } });
        require(['vs/editor/editor.main'], function () {
            const language = getLanguageFromFileExtension(filePath);
            window.editor = monaco.editor.create(document.getElementById('container'), {
                value: '',
                language: language, // Set the language dynamically
                theme: 'vs-dark',
                automaticLayout: true
            });

            // Fetch file content
            const loadFileUrl = `${serverUrl}/load_file?file_path=${encodeURIComponent(filePath)}${token ? `&token=${encodeURIComponent(token)}` : ''}`;

            fetch(loadFileUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Failed to load file content. Status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.content) {
                        window.editor.setValue(data.content);
                    }
                })
                .catch(error => {
                    console.error('Failed to load file content:', error);
                    alert('Failed to load file content. Check the console for details.');
                });

            // Save file content
            const saveFile = async () => {
                const content = window.editor.getValue();
                const saveFileUrl = `${serverUrl}/save_file${token ? `?token=${encodeURIComponent(token)}` : ''}`;
                const saveOptions = {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ file_path: filePath, content })
                };

                try {
                    const response = await fetch(saveFileUrl, saveOptions);
                    if (response.ok) {
                        showNotification('File saved successfully.', 'success');
                    } else {
                        const errorText = await response.text();
                        showNotification('Failed to save file.', 'error');
                        console.error(errorText);
                    }
                } catch (error) {
                    console.error('Error during save operation:', error);
                    showNotification('Failed to save file. Check the console for details.', 'error');
                }

            };

            // Handle Keyboard Shortcut
            window.addEventListener('keydown', (event) => {
                if ((isMacOS && event.metaKey && event.key === 's') || (!isMacOS && event.ctrlKey && event.key === 's')) {
                    event.preventDefault(); // Prevent default browser save dialog
                    saveFile(); // Trigger file save
                }
            });
        });
    </script>
</body>
</html>
