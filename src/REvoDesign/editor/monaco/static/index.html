<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Editor</title>
    <script src="/static/vs/loader.js"></script>
    <style>
        html, body, #container {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        #saveButton {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        #saveButton:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <button id="saveButton">Save</button>

    <script>
        const serverUrl = `${window.location.origin}`;
        const token = localStorage.getItem('token'); // Retrieve token from localStorage if present

        // Load Monaco Editor
        require.config({ paths: { 'vs': '/static/vs' } });
        require(['vs/editor/editor.main'], function () {
            window.editor = monaco.editor.create(document.getElementById('container'), {
                value: '',
                language: 'python',
                theme: 'vs-dark',
                automaticLayout: true
            });

            // Fetch file content
            const filePath = new URLSearchParams(window.location.search).get('file_path');
            const fetchOptions = {
                headers: {}
            };

            if (token) {
                fetchOptions.headers['Authorization'] = `Bearer ${token}`;
            }

            fetch(`${serverUrl}/load_file?file_path=${encodeURIComponent(filePath)}`, fetchOptions)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load file content.');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.content) {
                        window.editor.setValue(data.content);
                    }
                })
                .catch(error => {
                    console.error('Failed to load file content:', error);
                    alert('Failed to load file content.');
                });

            // Save file content
            document.getElementById('saveButton').addEventListener('click', async () => {
                const content = window.editor.getValue();
                const saveOptions = {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ file_path: filePath, content })
                };

                if (token) {
                    saveOptions.headers['Authorization'] = `Bearer ${token}`;
                }

                try {
                    const response = await fetch(`${serverUrl}/save_file`, saveOptions);
                    if (response.ok) {
                        alert('File saved successfully.');
                    } else {
                        const errorText = await response.text();
                        alert('Failed to save file.');
                        console.error(errorText);
                    }
                } catch (error) {
                    console.error('Error during save operation:', error);
                    alert('Failed to save file.');
                }
            });
        });
    </script>
</body>
</html>
