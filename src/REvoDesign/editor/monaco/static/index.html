<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Editor</title>
    <script src="/static/vs/loader.js"></script>
    <style>
        html, body, #container {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        #saveButton {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        #saveButton:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <button id="saveButton">Save</button>

    <script>
        const serverUrl = `${window.location.origin}`;
        const token = localStorage.getItem('token'); // Ensure token is securely stored in localStorage

        // Authenticate and load the editor
        fetch(`${serverUrl}/editor`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ token })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Unauthorized access');
            }
            return response.json(); // Return additional configuration if needed
        })
        .then(() => {
            // Load Monaco Editor
            require.config({ paths: { 'vs': '/static/vs' } });
            require(['vs/editor/editor.main'], function () {
                window.editor = monaco.editor.create(document.getElementById('container'), {
                    value: '',
                    language: 'python',
                    theme: 'vs-dark',
                    automaticLayout: true
                });

                // Fetch file content
                const filePath = new URLSearchParams(window.location.search).get('file_path');
                fetch(`${serverUrl}/load_file?file_path=${encodeURIComponent(filePath)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.content) {
                        window.editor.setValue(data.content);
                    }
                })
                .catch(error => {
                    console.error('Failed to load file content:', error);
                    alert('Failed to load file content.');
                });

                // Save file content
                document.getElementById('saveButton').addEventListener('click', async () => {
                    const content = window.editor.getValue();
                    const response = await fetch(`${serverUrl}/save_file`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ file_path: filePath, content })
                    });

                    if (response.ok) {
                        alert('File saved successfully.');
                    } else {
                        alert('Failed to save file.');
                        console.error(await response.text());
                    }
                });
            });
        })
        .catch(error => {
            console.error('Failed to authenticate or load editor:', error);
            alert('Access denied.');
        });
    </script>
</body>
</html>
