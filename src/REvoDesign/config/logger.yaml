# Logger configuration file for REvoDesign

version: 1
disable_existing_loggers: true
formatters:
  simple:
    format: '%(message)s'
    datefmt: '%Y-%m-%dT%H:%M:%S%z'
  complex:
    format: '%(name)s %(module)s.%(funcName)s:%(lineno)d %(message)s'
    datefmt: '%Y-%m-%dT%H:%M:%S%z'
  detailed:
    format: '%(asctime)s %(levelname)s %(name)s %(module)s.%(funcName)s:%(lineno)d %(threadName)s: %(message)s'
    datefmt: '%Y-%m-%dT%H:%M:%S%z'
  json:
    fmt_keys:
      level: levelname
      message: message
      timestamp: timestamp
      logger: name
      module: module
      function: funcName
      line: lineno
      thread_name: threadName
handlers:
  stdout:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout
  stderr:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple
    stream: ext://sys.stderr
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: AUTO
    maxBytes: 1000_000
    backupCount: 10
  notebook:
    class: logging.handlers.RotatingFileHandler
    level: WARNING
    formatter: json
    filename: AUTO
    maxBytes: 1000_000
    backupCount: 30

loggers:
  root:
    level: DEBUG

# Standard Python logging levels — used by list_all_logger_levels() at runtime.
# Cached after first read; update this list and call reload_config_file("logger") to refresh.
levels:
  - DEBUG
  - INFO
  - WARNING
  - ERROR
  - CRITICAL

# Available log channels — used by list_all_logger_channels() at runtime.
channels:
  - stdout
  - stderr
  - file
  - notebook
  - root

# Non-JSON formatter names — used by list_all_logger_formatters_non_json() at runtime.
formatters_non_json:
  - simple
  - complex
  - detailed

