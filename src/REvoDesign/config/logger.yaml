# Logger configuration file for REvoDesign

version: 1
disable_existing_loggers: true
formatters:
  simple:
    format: '%(message)s'
    datefmt: '%Y-%m-%dT%H:%M:%S%z'
  complex:
    format: '%(name)s %(module)s.%(funcName)s:%(lineno)d %(message)s'
    datefmt: '%Y-%m-%dT%H:%M:%S%z'
  detailed:
    format: '%(asctime)s %(levelname)s %(name)s %(module)s.%(funcName)s:%(lineno)d %(threadName)s: %(message)s'
    datefmt: '%Y-%m-%dT%H:%M:%S%z'
  json:
    fmt_keys:
      level: levelname
      message: message
      timestamp: timestamp
      logger: name
      module: module
      function: funcName
      line: lineno
      thread_name: threadName
handlers:
  stdout:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout
  stderr:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple
    stream: ext://sys.stderr
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: AUTO
    maxBytes: 1000_000
    backupCount: 10
  notebook:
    class: logging.handlers.RotatingFileHandler
    level: WARNING
    formatter: json
    filename: AUTO
    maxBytes: 1000_000
    backupCount: 30

loggers:
  root:
    level: DEBUG

