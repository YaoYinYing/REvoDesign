# OpenKinetics API configuration.
# Loaded via reload_config_file("third_party/scorers/openkinetics_api")["third_party"]

scorers:
  openkinetics:
    enabled: false
    base_url: "https://predictor.openkinetics.org/api/v1"
    default_method: "CataPro"
    default_prediction_type: "kcat/Km"
    poll_interval_seconds: 3
    timeout_seconds: 600
    cache_enabled: true