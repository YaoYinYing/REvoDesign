
# REvoDesign Appearance — Crystallography + Lab Notebook theme
# Applied by ThemeManager during plugin startup.
# Changes take effect after restarting PyMOL or via Edit > Reconfigure.

# ---- Semantic Colour Tokens (see theme.qss for usage) ----

# Interactive — deep violet-indigo (X-ray diffraction pattern)
interactive: "#4338CA"
interactive_hover: "#3730A3"
interactive_subtle: "#EEECFF"

# Status
positive: "#0D9488"             # teal — accept, success
warning: "#92400E"              # warm amber — deprecated, caution
danger: "#B91C1C"               # muted red — reject, destructive

# Accent — copper (X-ray source metal, used sparingly)
copper: "#C2410C"

# Surfaces — warm paper / lab notebook
bg: "#F6F4F0"
surface: "#FFFFFF"
surface_alt: "#FBF9F7"

# Content — warm near-black
text: "#1E1B18"
text_secondary: "#6B6560"
text_disabled: "#A39D98"

# Outlines — warm gray
border: "#E6E2DD"
border_hover: "#D4CFC9"

# ---- Typography ----
font_family: ""                  # empty = OS system font
font_size_scale: 1.0             # 1.0 = system default

# ---- Button Matrix ----
button_matrix:
  hover_crosshair:
    color: "#20c45a"
    width: 4
