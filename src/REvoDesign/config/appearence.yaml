
# REvoDesign Appearance — Academic theme configuration
# Applied by ThemeManager during plugin startup.
# Changes take effect after restarting PyMOL or via Edit > Reconfigure.

# ---- Semantic Colour Tokens ----
# Interactive
interactive: "#3B49DF"          # deep indigo — primary actions, focus, active tabs
interactive_hover: "#2F3ABF"    # darker indigo — hover on primary buttons
interactive_subtle: "#E8E9FF"   # pale indigo — selected rows, hover backgrounds

# Status
positive: "#0D9488"             # teal — accept, success
warning: "#B45309"              # amber ochre — deprecated, caution
danger: "#C53030"               # muted crimson — reject, destructive

# Surfaces
bg: "#F4F5F7"                   # page background
surface: "#FFFFFF"               # cards, group boxes, tab panes
surface_alt: "#FAFBFC"          # alternate rows, subtle differentiation

# Content
text: "#1A1C2E"                 # primary text — near-black with blue undertone
text_secondary: "#5B6080"       # secondary labels, muted content
text_disabled: "#8E93A8"        # disabled, placeholder

# Outlines
border: "#E2E4EB"               # card/input borders
border_hover: "#C5C8D4"

# ---- Typography ----
font_family: ""                  # empty = OS system font (recommended)
font_size_scale: 1.0             # 1.0 = system default, 1.15 = 115%

# ---- Button Matrix ----
button_matrix:
  hover_crosshair:
    color: "#20c45a"
    width: 4
