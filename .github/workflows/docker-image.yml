name: Docker Image for Server

on:
  workflow_dispatch:
  push:
    paths:
      - 'server/docker/Dockerfile' # Monitor the entire 'docker' directory
      - '.github/workflows/docker-image.yml' # monitor the main workflow script. enable it again if in necessary maintainances.

    branches:
      - main

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set environment variable with current date
      run: |
        echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
        echo "DATE: ${{ env.DATE }}"
    
    - name: Build runner Docker image
      run: docker build -f server/docker/runner/Dockerfile server -t revodesign-pssm-gremlin

    - name: Build server Docker image
      run: docker build -f server/docker/server/Dockerfile . -t revodesign-pssm-gremlin-server

    - name: Tag Docker image with date and latest
      run: |
        docker tag revodesign-pssm-gremlin yaoyinying/revodesign-pssm-gremlin:${{ env.DATE }}
        docker tag revodesign-pssm-gremlin yaoyinying/revodesign-pssm-gremlin:latest
        docker tag revodesign-pssm-gremlin-server yaoyinying/revodesign-pssm-gremlin-server:${{ env.DATE }}
        docker tag revodesign-pssm-gremlin-server yaoyinying/revodesign-pssm-gremlin-server:latest

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_GITHUB_REPO_SECRET }}" | docker login -u yaoyinying --password-stdin

        
    - name: Push Docker image
      run: |
        docker push yaoyinying/revodesign-pssm-gremlin:${{ env.DATE }}
        docker push yaoyinying/revodesign-pssm-gremlin:latest
        docker push yaoyinying/revodesign-pssm-gremlin-server:${{ env.DATE }}
        docker push yaoyinying/revodesign-pssm-gremlin-server:latest

    - name: Refresh Docker Hub Description
      uses: peter-evans/dockerhub-description@v3
      with:
        username: yaoyinying
        password: ${{ secrets.DOCKER_GITHUB_REPO_SECRET }}
        repository: yaoyinying/revodesign-pssm-gremlin
        readme-filepath: ./server/README.md
        enable-url-completion: true
