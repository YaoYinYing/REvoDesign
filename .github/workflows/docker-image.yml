name: Docker Image for Server

on:
  workflow_dispatch:

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    env:
      RUNNER_UID: "1000"
      RUNNER_GID: "1000"
      RUNNER_USERNAME: "revodesign"
      RUNNER_GROUP: "revodesign_appgroup"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      
    - name: Set environment variable with current date
      run: |
        echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
        echo "DATE: ${{ env.DATE }}"
    
    - name: Build runner Docker image
      run: |
        docker build \
          --build-arg RUNNER_UID="${RUNNER_UID}" \
          --build-arg RUNNER_GID="${RUNNER_GID}" \
          --build-arg RUNNER_USERNAME="${RUNNER_USERNAME}" \
          --build-arg RUNNER_GROUP="${RUNNER_GROUP}" \
          -f server/docker/runner/Dockerfile server \
          -t revodesign-pssm-gremlin-non-root

    - name: Build server Docker image
      run: |
        docker build \
          --build-arg RUNNER_UID="${RUNNER_UID}" \
          --build-arg RUNNER_GID="${RUNNER_GID}" \
          --build-arg RUNNER_USERNAME="${RUNNER_USERNAME}" \
          --build-arg RUNNER_GROUP="${RUNNER_GROUP}" \
          -f server/docker/server/Dockerfile server \
          -t revodesign-pssm-gremlin-server-non-root

    - name: Tag Docker image with date and latest
      run: |
        docker tag revodesign-pssm-gremlin-non-root yaoyinying/revodesign-pssm-gremlin-non-root:${{ env.DATE }}
        docker tag revodesign-pssm-gremlin-non-root yaoyinying/revodesign-pssm-gremlin-non-root:latest
        docker tag revodesign-pssm-gremlin-server-non-root yaoyinying/revodesign-pssm-gremlin-server-non-root:${{ env.DATE }}
        docker tag revodesign-pssm-gremlin-server-non-root yaoyinying/revodesign-pssm-gremlin-server-non-root:latest

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_GITHUB_REPO_SECRET }}" | docker login -u yaoyinying --password-stdin

        
    - name: Push Docker image
      run: |
        docker push yaoyinying/revodesign-pssm-gremlin-non-root:${{ env.DATE }}
        docker push yaoyinying/revodesign-pssm-gremlin-non-root:latest
        docker push yaoyinying/revodesign-pssm-gremlin-server-non-root:${{ env.DATE }}
        docker push yaoyinying/revodesign-pssm-gremlin-server-non-root:latest

    - name: Refresh Docker Hub Description
      uses: peter-evans/dockerhub-description@dc67fad7001ef9e8e3c124cb7a64e16d0a63d864 # v3
      with:
        username: yaoyinying
        password: ${{ secrets.DOCKER_GITHUB_REPO_SECRET }}
        repository: yaoyinying/revodesign-pssm-gremlin-non-root
        readme-filepath: ./server/README.md
        enable-url-completion: true
