name: Python Publish Workflow
on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    uses: YaoYinYing/action-python/.github/workflows/publish.yml@v7.3.1-post-6
    secrets:
      PYPI_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      TEST_PYPI_PASSWORD: ${{ secrets.TEST_PYPI_PASSWORD  }}