name: Python Publish Workflow
on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      repository:
        description: "Upload target"
        required: true
        default: pypi
        type: choice
        options:
          - pypi
          - testpypi

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.1.1
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload to PyPI
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.repository == 'pypi'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: python -m twine upload --non-interactive --skip-existing dist/*

      - name: Upload to TestPyPI
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'testpypi') ||
          (github.event_name == 'push' &&
           !startsWith(github.ref, 'refs/tags/') &&
           contains(github.event.head_commit.message, '[testpypi]'))
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_PASSWORD }}
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          import subprocess
          import sys
          import urllib.error
          import urllib.request

          project_candidates = ("REvoDesign", "revodesign")
          existing_filenames = set()

          for project in project_candidates:
              url = f"https://test.pypi.org/pypi/{project}/json"
              try:
                  with urllib.request.urlopen(url, timeout=20) as resp:
                      payload = json.load(resp)
                  for files in payload.get("releases", {}).values():
                      for file_info in files:
                          name = file_info.get("filename")
                          if name:
                              existing_filenames.add(name)
              except urllib.error.HTTPError as exc:
                  if exc.code != 404:
                      raise

          dist_files = sorted(glob.glob("dist/*"))
          if not dist_files:
              raise SystemExit("No files found under dist/.")

          to_upload = [f for f in dist_files if os.path.basename(f) not in existing_filenames]
          print("All dist files:", [os.path.basename(f) for f in dist_files])
          print("Existing on TestPyPI:", sorted(existing_filenames))
          print("Will upload:", [os.path.basename(f) for f in to_upload])

          if not to_upload:
              print("Nothing to upload: all artifacts already exist on TestPyPI.")
              raise SystemExit(0)

          for artifact in to_upload:
              cmd = [
                  sys.executable,
                  "-m",
                  "twine",
                  "upload",
                  "--non-interactive",
                  "--verbose",
                  "--repository-url",
                  "https://test.pypi.org/legacy/",
                  artifact,
              ]
              print("Running:", " ".join(cmd))
              subprocess.check_call(cmd)
          PY
