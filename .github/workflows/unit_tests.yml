name: Test REvoDesign

on:
  push:
    paths:
      - '.github/workflows/unit_tests.yml' # monitor the main workflow script.
      - 'tests/*.py' # monitor the unit tests
      - 'REvoDesign' # monitor the REvoDesign project source code
      
    branches:
      - main

env: 
  conda_env: REvoDesign


jobs:
  Tests:
    strategy:
      fail-fast: false
      matrix:
        os: [debian-11, macOS-latest]
        python-version: ["3.9", "3.11"]
        # include:
        #   - os: armbian
        #     python-version: "3.11"

    runs-on: ${{ matrix.os }}

    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}

    defaults:
      run:
        shell: bash -el {0}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Repository Path
        run: |
          echo "REPO=$PWD" >> $GITHUB_ENV
        
      
      - name: Setup Conda on ${{ matrix.os }}
        uses: conda-incubator/setup-miniconda@v3
        with:
            auto-update-conda: false
            activate-environment: ${{ env.conda_env }}
            auto-activate-base: false
            python-version: ${{ matrix.python-version }}
            miniconda-version: "latest"

      - name: Setup PyMOL on ${{ matrix.os }} - py${{ matrix.python-version }}
        run: |
          conda install -c conda-forge pymol-open-source -n ${{ env.conda_env }} -y 
          conda info
          conda list
          which python
          which python3


      - name: Install REvoDesign on ${{ matrix.os }}
        run: |
          make install

      - name: Unit Test on ${{ matrix.os }}
        env:
          REVODESIGN_USERS: ${{ secrets.REVODESIGN_USERS }}
          REVODESIGN_SERVER_PASS: ${{ secrets.REVODESIGN_SERVER_PASS }}

        run: |
          make test

      - name: Convert coverage report to XML for codecov
        run: coverage xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          env_vars: OS,PYTHON
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
