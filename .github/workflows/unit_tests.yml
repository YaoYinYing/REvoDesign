name: Test REvoDesign

on:
  push:
    paths:
      - '.github/workflows/unit_tests.yml' # monitor the main workflow script. enable it again if in necessary maintainances.

    branches:
      - main
    

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set environment variable with current repo dir
      run: |
        echo "REPO=$PWD" >> $GITHUB_ENV
    

    - name: Install system dependencies
      run: >
        sudo apt-get update;
        sudo apt-get --no-install-recommends install
        libfreetype6-dev
        libglew-dev
        libglm-dev
        libmsgpack-dev
        libnetcdf-dev
        libpng-dev
        libxml2-dev
        python-is-python3
        python3-biopython
        python3-dev
        python3-distutils
        python3-numpy
        python3-pil
        python3-pytest

    - name: Install collada2gltf
      run: |
        wget -nv https://anaconda.org/schrodinger/collada2gltf/2.1.4/download/linux-64/collada2gltf-2.1.4-h6bb024c_0.tar.bz2
        sudo tar xf collada2gltf-*.tar.bz2 -C / bin/collada2gltf


    - name: Build pymol-open-source
      run: |
        python -m pip install PyQt5==5.15.10

        git clone https://github.com/schrodinger/pymol-open-source.git
        cd pymol-open-source
        python setup.py install --prefix=${{ env.REPO }}/pymol/  --use-msgpackc=no --no-vmd-plugins --jobs=4

      
    - name: Install REvoDesign via pip
      run: |
        python -m pip install .[colabdesign] -U

    - name: Test
      run: |
      REVODESIGN_SERVER_PASS=${{ secrets.REVODESIGN_SERVER_PASS }} ${{ env.REPO }}/pymol/bin/pymol run ${{ env.REPO }}/tests/UnitTests.py