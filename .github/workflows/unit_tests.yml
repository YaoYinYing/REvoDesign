name: Unit Test

on:
  push:
    paths:
      - '.github/workflows/unit_tests.yml' # monitor the main workflow script.
      - 'tests/*.py' # monitor the unit tests
      - 'REvoDesign' # monitor the REvoDesign project source code
      
    branches:
      - main

env: 
  conda_env: REvoDesign


jobs:
  Tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-12, macos-14, windows-latest]
        python-version: ["3.11"]

    runs-on: ${{ matrix.os }}

    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}

    defaults:
      run:
        shell: bash -el {0}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4     
    
      - name: Setup Conda on macos-14
        uses: conda-incubator/setup-miniconda@v3
        if: matrix.os == 'macos-14'
        with:
            installer-url: https://github.com/conda-forge/miniforge/releases/download/23.11.0-0/Mambaforge-23.11.0-0-MacOSX-arm64.sh
            auto-update-conda: false
            activate-environment: ${{ env.conda_env }}
            auto-activate-base: false
            python-version: ${{ matrix.python-version }}
      
      - name: Setup Conda on windows, ubuntu and macos-12
        if: startsWith(matrix.os, 'windows') || startsWith(matrix.os, 'ubuntu') || matrix.os == 'macos-12'
        uses: s-weigand/setup-conda@v1
        with:
          activate-conda: false
          update-conda: false
          conda-channels: conda-forge
      
      - name: activate Conda env on windows, ubuntu and macos-12
        if: startsWith(matrix.os, 'windows') || startsWith(matrix.os, 'ubuntu') || matrix.os == 'macos-12'
        run: |
          conda create -y -n ${{ env.conda_env }} python=${{ matrix.python-version }}
          conda activate ${{ env.conda_env }}

      - name: Setup PyMOL on ${{ matrix.os }} - py${{ matrix.python-version }}
        run: |
          conda install -c conda-forge pymol-open-source -n ${{ env.conda_env }} -y 
          conda info
          conda list
          which python
          which python3

      - name: Install REvoDesign on ${{ matrix.os }}
        run: |
          make install

      - name: Unit Test on ${{ matrix.os }}
        env:
          REVODESIGN_USERS: ${{ secrets.REVODESIGN_USERS }}
          REVODESIGN_SERVER_PASS: ${{ secrets.REVODESIGN_SERVER_PASS }}

        run: |
          make test

      - name: Convert coverage report to XML for codecov
        run: coverage xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          env_vars: OS,PYTHON
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
