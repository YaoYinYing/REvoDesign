name: Unit Test

on:
  push:
    paths:
      - '.github/workflows/unit_tests.yml' # monitor the main workflow script.
      - 'tests/*.py' # monitor the unit tests
      - 'REvoDesign/*' # monitor the REvoDesign project source code
      
    branches:
      - main
      - qt-test

env: 
  conda_env: REvoDesign


jobs:
  Tests:
    strategy:
      fail-fast: false
      matrix:
        os: 
          - ubuntu-latest
          #- macos-14
        python-version: 
          - "3.9"
          - "3.10"
          - "3.11"
        # include:
        #   - os: windows-latest
        #     python-version: "3.11"

    runs-on: ${{ matrix.os }}

    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}
      DISPLAY: ':99.0'

    defaults:
      run:
        shell: bash -el {0}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setting up display
      # https://pytest-qt.readthedocs.io/en/latest/troubleshooting.html#github-actions
      # https://github.com/tlambert03/setup-qt-libs
      - name: setup Qt headless Display on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt install libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils
          /sbin/start-stop-daemon --start --quiet --pidfile /tmp/custom_xvfb_99.pid --make-pidfile --background --exec /usr/bin/Xvfb -- :99 -screen 0 1920x1200x24 -ac +extension GLX

      - name: setup Qt headless Display on Windows
        if: startsWith(matrix.os, 'windows')
        uses: pyvista/setup-headless-display-action@v2
      
      - name: Setup Conda on ${{ matrix.os }}
        uses: conda-incubator/setup-miniconda@v3
        if: matrix.os != 'macos-14'
        with:
            miniforge-variant: Mambaforge
            miniforge-version: latest
            auto-update-conda: false
            activate-environment: ${{ env.conda_env }}
            auto-activate-base: false
            python-version: ${{ matrix.python-version }}
      
      - name: Setup Conda on macos-14
        uses: conda-incubator/setup-miniconda@v3
        if: matrix.os == 'macos-14'
        with:
            installer-url: https://github.com/conda-forge/miniforge/releases/download/23.11.0-0/Mambaforge-23.11.0-0-MacOSX-arm64.sh
            auto-update-conda: false
            activate-environment: ${{ env.conda_env }}
            auto-activate-base: false
            python-version: ${{ matrix.python-version }}

      - name: Setup PyMOL on ${{ matrix.os }} - py${{ matrix.python-version }}
        run: |
          conda install -c conda-forge pymol-open-source -n ${{ env.conda_env }} -y 
          conda info
          conda list
          which python
          which python3
      - name: Install REvoDesign on ${{ matrix.os }}
        run: |
          make install

      - name: Full Unit Test on Ubuntu
        env:
          REVODESIGN_USERS: ${{ secrets.REVODESIGN_USERS }}
          REVODESIGN_SERVER_PASS: ${{ secrets.REVODESIGN_SERVER_PASS }}

        run: |
          make all-test
      
      - name: Convert coverage report to XML for codecov
        run: coverage xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          env_vars: OS,PYTHON
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}