name: Test REvoDesign

on:
  push:
    paths:
      - '.github/workflows/unit_tests.yml' # monitor the main workflow script.
      - 'tests/*.py' # monitor the unit tests
      - 'REvoDesign' # monitor the REvoDesign project source code
      
    branches:
      - main


jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    env:
      PYTHON_EXEC: ${{ matrix.os != 'windows-latest'  && 'python3' || 'C:\Programs\PyMOL\python.exe' }} 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
        
      
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
            auto-update-conda: true
            miniconda-version: "latest"
            activate-environment: REvoDesign

      - name: Setup PyMOL for Ubuntu
        run: |
          conda install -c conda-forge pymol-open-source -y


      - name: Install REvoDesign
        run: |
          python -m pip install .[colabdesign] -U

      - name: Unit Test
        env:
          REVODESIGN_USERS: ${{ secrets.REVODESIGN_USERS }}
          REVODESIGN_SERVER_PASS: ${{ secrets.REVODESIGN_SERVER_PASS }}
          REPO: ${{ github.repository }}
        run: |
          python ${{ env.REPO }}/tests/UnitTests.py
