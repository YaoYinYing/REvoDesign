name: Bare Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

env: 
  conda_env: REvoDesign
  
  ENABLE_ROSETTA_CONTAINER_NODE_TEST: "NO" # Github Actions: run python against container node

jobs:
  BareTests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
        pymol-tag:
          - 'latest pymol open source'
        conda-channel:
          - -c conda-forge
        pymol-version:
          - "pymol-open-source"
        qt-version:
          - "5"

        include:
          # ubuntu qt6 py312 pymol-open-source
          - os: ubuntu-latest
            python-version: "3.12"
            pymol-tag: 'latest pymol open source'
            conda-channel: -c conda-forge
            pymol-version: "pymol-open-source"
            qt-version: "6"

          # macos pymol-open-source py311 qt5
          - os: macos-15
            python-version: "3.11"
            pymol-tag: 'latest pymol open source'
            conda-channel: -c conda-forge
            pymol-version: "pymol-open-source"
            qt-version: "5"

          # # macos pymol bundle py311 (qt5)
          # # pymol-bundle not available on macOS Apple Silicon
          # - os: macos-15
          #   python-version: "3.11"
          #   pymol-tag: 'latest pymol bundle'
          #   conda-channel: -c schrodinger -c conda-forge
          #   pymol-version: "pymol-bundle"
          #   qt-version: "5"

          # # windows pymol-open-source py311 qt5
          # # pymol-open-source not available on Windows
          # - os: windows-latest
          #   python-version: "3.11"
          #   pymol-tag: 'latest pymol open source'
          #   conda-channel: -c conda-forge
          #   pymol-version: "pymol-open-source"
          #   qt-version: "5"

          # # windows pymol bundle py311 (qt5)
          # # pymol-bundle not available on Windows
          # - os: windows-latest
          #   python-version: "3.11"
          #   pymol-tag: 'latest pymol bundle'
          #   conda-channel: -c schrodinger -c conda-forge
          #   pymol-version: "pymol-bundle"
          #   qt-version: "5"
            



    runs-on: ${{ matrix.os }}
    # set time limits according to the runner os. 
    # if the runner os is windows, set it to 60,
    # otherwise, set it to 35
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 60 || 35 }}


    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}
      DISPLAY: ':99.0'

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@85880fa0301c86cca9da44039ee3bb12d3bedbfa # 0.12.1

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: setup Qt headless Display on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          make setup-display-gha

      - name: Verify Docker Version and Pull Rosetta Image
        # the GHA runner windows does not support docker in linux, which requires nested VM under Hyper-V.
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          docker --version
          docker pull --platform=linux/amd64 rosettacommons/rosetta:mpi
          # set environment variable ENABLE_ROSETTA_CONTAINER_NODE_TEST to run REvoDesign against container node
          echo "ENABLE_ROSETTA_CONTAINER_NODE_TEST=YES" >> $GITHUB_ENV
      

      - name: setup Qt headless Display on Windows
        if: startsWith(matrix.os, 'windows')
        uses: pyvista/setup-headless-display-action@8b39741bba8c06652c7def81821b5841adc17582 # v2

      - name: setup Qt headless Display on macOS
        if: startsWith(matrix.os, 'macos')
        uses: pyvista/setup-headless-display-action@8b39741bba8c06652c7def81821b5841adc17582 # v2
      
      - name: Setup Conda on ${{ matrix.os }} 
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
            auto-update-conda: false
            activate-environment: ${{ env.conda_env }}
            auto-activate-base: false
            python-version: ${{ matrix.python-version }}
            conda-solver: libmamba
      
      - name: Setup PyMOL - (${{ matrix.pymol-tag }}, Qt${{ matrix.qt-version }})-(${{ matrix.os }}-py${{ matrix.python-version }})
        run: |
          if [ "${{ matrix.qt-version }}" = "bundled" ]; then
            # pymol-bundle ships with its own Qt, no separate pyqt needed
            conda install ${{ matrix.conda-channel}} '${{ matrix.pymol-version}}' -n ${{ env.conda_env }} -y
          elif [ "${{ matrix.qt-version }}" = "5" ]; then
            conda install ${{ matrix.conda-channel}} '${{ matrix.pymol-version}}' pyqt=5 -n ${{ env.conda_env }} -y
          else
            conda install ${{ matrix.conda-channel}} '${{ matrix.pymol-version}}' 'pyqt>=6' -n ${{ env.conda_env }} -y
          fi
          # for server testings on ubuntu (requires blast, hhsuite)
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            conda install -c conda-forge -c bioconda blast hhsuite -y -n ${{ env.conda_env }}
          fi
          conda info
          conda list
          which python
          which python3
      - name: Install REvoDesign on ${{ matrix.os }}
        run: |
          if [ "${{ matrix.os }}" = "macos-15" ]; then
            make install-pytorch-cpu-mac
          else
            make install-pytorch-cpu-non-mac
          fi
          make install
          # uvicorn 0.50.0 causes Qt event loop abort (SIGABRT) during pytest-qt qtbot.wait()
          pip install 'uvicorn<0.50.0'

      - name: Install DGL on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          make install-dgl-linux
          
      - name: Install DGL on Windows or macOS
        if: startsWith(matrix.os, 'windows') || startsWith(matrix.os, 'macos')
        run: |
          make install-dgl-win

      - name: Full Unit Test
        env:
          REVODESIGN_RUN_OPENKINETICS_LIVE: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && '1' || '' }}
          OPENKINETICS_API_KEY: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && secrets.OPENKINETICS_API_KEY || '' }}
        run: |
          make prepare-test
          make all-test
      
      - name: Convert coverage report to XML for codecov
        run: |
          coverage xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          env_vars: OS,PYTHON
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Clean up
        run: |
          make clean
