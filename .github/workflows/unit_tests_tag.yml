name: Unit Test on tagging

on:
  workflow_dispatch:
  push:
    paths:
      - '.CHANGELOG.md' 
      - '.pyproject.toml' 
      - 'REvoDesign/__version__.py'
      - '.github/workflows/unit_tests_tag.yml'
      
    branches:
      - main

env: 
  conda_env: REvoDesign

jobs:
  BareTests:
    strategy:
      fail-fast: false
      matrix:
        os: 
          - ubuntu-latest
        python-version: 
          - "3.9"
          - "3.10"
          - "3.11"
        include:
          - os: windows-latest
            python-version: "3.11"

    runs-on: ${{ matrix.os }}

    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}
      DISPLAY: ':99.0'

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: setup Qt headless Display on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          make setup-ubuntu

      - name: setup Qt headless Display on Windows
        if: startsWith(matrix.os, 'windows')
        uses: pyvista/setup-headless-display-action@v2
      
      - name: Setup Conda on ${{ matrix.os }}
        uses: conda-incubator/setup-miniconda@v3
        with:
            miniforge-variant: Mambaforge
            miniforge-version: latest
            auto-update-conda: false
            activate-environment: ${{ env.conda_env }}
            auto-activate-base: false
            python-version: ${{ matrix.python-version }}
      
      - name: Setup PyMOL on ${{ matrix.os }} - py${{ matrix.python-version }}
        run: |
          conda install -c conda-forge pymol-open-source -n ${{ env.conda_env }} -y 
          conda info
          conda list
          which python
          which python3
      - name: Install REvoDesign on ${{ matrix.os }}
        run: |
          make install

      - name: Full Unit Test on Ubuntu
        env:
          REVODESIGN_USERS: ${{ secrets.REVODESIGN_USERS }}
          REVODESIGN_SERVER_PASS: ${{ secrets.REVODESIGN_SERVER_PASS }}

        run: |
          make prepare-test
          make all-test
      
      - name: Convert coverage report to XML for codecov
        run: |
          coverage xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          env_vars: OS,PYTHON
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}