name: Bare Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

env: 
  conda_env: REvoDesign
  
  ENABLE_ROSETTA_CONTAINER_NODE_TEST: "NO" # Github Actions: run python against container node

jobs:
  BareTests:
    strategy:
      fail-fast: false
      matrix:
        os: 
          - ubuntu-latest
        conda-channel:
          - -c conda-forge
        pymol-version:
          - "pymol-open-source"
        pymol-tag:
          - 'latest pymol open source'
        python-version: 
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
        include:
          # windows
          # - os: windows-latest
          #   python-version: "3.11"
          #   conda-channel: -c conda-forge
          #   pymol-version: "pymol-open-source"
          #   pymol-tag: 'latest pymol open source'

          # macos latest, latest pymol open source and py312
          # - os: macos-15
          #   python-version: "3.12"
          #   pymol-version: "pymol-open-source"
          #   pymol-tag: 'latest pymol open source'
          #   conda-channel: -c conda-forge

          # # macos tahoe, latest pymol open source and py312
          # - os: macos-26
          #   python-version: "3.12"
          #   pymol-version: "pymol-open-source"
          #   pymol-tag: 'latest pymol open source'
          #   conda-channel: -c conda-forge


          # # ubuntu arm 
          # not available for private repos
          # - os: ubuntu-24.04-arm
          #   python-version: "3.12"
          #   pymol-version: "pymol-open-source"
          #   pymol-tag: 'latest pymol open source'
          #   conda-channel: -c conda-forge
          
          # latest bundled pymol 
          - os: ubuntu-latest
            python-version: "3.10"
            pymol-version: "pymol-bundle"
            pymol-tag: 'latest pymol bundle'
            conda-channel: -c schrodinger -c conda-forge
          
          # pymol-open-source, v2
          - os: ubuntu-latest
            python-version: "3.10"
            pymol-version: "pymol-open-source<3"
            conda-channel: -c conda-forge
            pymol-tag:
              - 'legacy (v2) pymol open source'

          # bundled pymol, v2
          - os: ubuntu-latest
            python-version: "3.10"
            pymol-version: "pymol-bundle<3"
            conda-channel: -c schrodinger -c conda-forge
            pymol-tag:
              - 'legacy (v2) pymol bundle'

    runs-on: ${{ matrix.os }}
    # set time limits according to the runner os. 
    # if the runner os is windows, set it to 60,
    # otherwise, set it to 35
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 60 || 35 }}


    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}
      DISPLAY: ':99.0'

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: setup Qt headless Display on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          make setup-display-gha

      - name: Verify Docker Version and Pull Rosetta Image
        # the GHA runner windows does not support docker in linux, which requires nested VM under Hyper-V.
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          docker --version
          docker pull --platform=linux/amd64 rosettacommons/rosetta:mpi
          # set environment variable ENABLE_ROSETTA_CONTAINER_NODE_TEST to run REvoDesign against container node
          echo "ENABLE_ROSETTA_CONTAINER_NODE_TEST=YES" >> $GITHUB_ENV
      

      - name: setup Qt headless Display on Windows
        if: startsWith(matrix.os, 'windows')
        uses: pyvista/setup-headless-display-action@v2
      
      - name: Setup Conda on ${{ matrix.os }} 
        uses: conda-incubator/setup-miniconda@v3
        with:
            auto-update-conda: false
            activate-environment: ${{ env.conda_env }}
            auto-activate-base: false
            python-version: ${{ matrix.python-version }}
            conda-solver: libmamba
      
      - name: Setup PyMOL - (${{ matrix.pymol-tag }})-(${{ matrix.os }}-py${{ matrix.python-version }})
        run: |
          conda install ${{ matrix.conda-channel}} '${{ matrix.pymol-version}}' pyqt=5 -n ${{ env.conda_env }} -y
          conda info
          conda list
          which python
          which python3
      - name: Install REvoDesign on ${{ matrix.os }}
        run: |
          make install
      
      - name: Install DGL on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          make install-dgl-linux
          
      - name: Install DGL on Windows or macOS
        if: startsWith(matrix.os, 'windows') || startsWith(matrix.os, 'macos')
        run: |
          make install-dgl-win

      - name: Full Unit Test on Ubuntu
        run: |
          make prepare-test
          make all-test
      
      - name: Convert coverage report to XML for codecov
        run: |
          coverage xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          env_vars: OS,PYTHON
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Clean up
        run: |
          make clean