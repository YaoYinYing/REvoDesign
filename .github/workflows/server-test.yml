name: Server Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "server/**"
  pull_request:
    branches: [main]
    paths:
      - "server/**"

permissions:
  contents: read
  id-token: write

jobs:
  ServerTests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      OS: ubuntu-latest
      PYTHON: "3.12"

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@85880fa0301c86cca9da44039ee3bb12d3bedbfa # 0.12.1

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Server and Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "server/[test]"
          pip install pytest-cov pytest-order pytest-dependency

      - name: Run Server Tests (non-Docker)
        run: |
          python -m pytest server/tests/ -v --cov=pssm_gremlin_server --cov-report=xml --override-ini="addopts=" \
            -k "not Docker and not docker and not runner_image and not server_image and not test_server_image and not test_runner_image and not test_server_rejects and not test_server_reports and not running_gremlin"

      - name: Upload coverage report to DeepSource
        run: |
          curl -fsSL https://cli.deepsource.com/install | BINDIR=./bin sh
          ./bin/deepsource report --analyzer test-coverage --key python --value-file ./coverage.xml --use-oidc

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          flags: server
