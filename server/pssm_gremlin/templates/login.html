<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REvoDesign | Log In</title>
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="icon" type="image/svg+xml" href="/PSSM_GREMLIN/logo.svg"/>
<link rel="mask-icon" href="/PSSM_GREMLIN/logo.svg" color="#000000"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/auth-page.css">
<script src="/static/js/theme.js"></script>
</head>
<body>
<main class="page">
  <div class="nav-row">
    <a href="/PSSM_GREMLIN/dashboard">← Dashboard</a>
    <button class="btn btn-soft theme-toggle mode-auto" type="button" id="themeToggle" aria-pressed="mixed" title="Cycle theme"><span class="theme-icon" aria-hidden="true">◐</span></button>
    <a href="/PSSM_GREMLIN/register">Create account</a>
  </div>
  <div class="panel">
    <h1 class="headline">Log In</h1>
    <p class="subline">Sign in to access your GREMLIN tasks.</p>
    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" required autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <div class="actions">
        <button class="btn btn-primary" type="submit" id="submitBtn">Log In</button>
      </div>
      <div class="status-msg" id="status" role="alert"></div>
    </form>
  </div>
  <div class="info-note">
    After logging in, use the token for API requests:<br>
    <code>curl -H "Authorization: Bearer &lt;token&gt;" ...</code>
  </div>
</main>
<script src="/static/js/auth-api.js"></script>
<script src="/static/js/login.js"></script>
</body>
</html>
