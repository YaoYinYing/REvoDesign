<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REvoDesign | Log In</title>
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="icon" type="image/svg+xml" href="/PSSM_GREMLIN/logo.svg"/>
<link rel="mask-icon" href="/PSSM_GREMLIN/logo.svg" color="#000000"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/auth-page.css">
<script src="/static/js/theme.js"></script>
</head>
<body>
<main class="page auth-page">
  <div class="nav-row">
    <a href="/PSSM_GREMLIN/dashboard" class="back-link">&larr;&nbsp;Dashboard</a>
    <button class="btn btn-soft theme-toggle mode-auto" type="button" id="themeToggle" aria-pressed="mixed" title="Cycle theme"><span class="theme-icon" aria-hidden="true">&#9680;</span></button>
    <a href="/PSSM_GREMLIN/register" class="alt-link">Create account</a>
  </div>

  <section class="panel auth-panel">
    <h1 class="headline">Log In</h1>
    <p class="subline">Sign in to access your GREMLIN workspace.</p>

    <form id="loginForm" class="auth-form">
      <div class="field">
        <label for="username">Username or email</label>
        <input type="text" id="username" class="text-input" required autocomplete="username" placeholder="you@example.com" autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" class="text-input" required autocomplete="current-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
      </div>
      <div class="actions">
        <button class="btn btn-primary btn-full" type="submit" id="submitBtn">Log In</button>
      </div>
      <div class="status-msg" id="status" role="alert"></div>
    </form>
  </section>

  <details class="dev-note">
    <summary>Developer access</summary>
    <p>After logging in, use the token for API requests:</p>
    <code>curl -H "Authorization: Bearer &lt;token&gt;" http://localhost:8080/PSSM_GREMLIN/api/auth/me</code>
  </details>
</main>
<script src="/static/js/auth-api.js"></script>
<script src="/static/js/login.js"></script>
</body>
</html>
