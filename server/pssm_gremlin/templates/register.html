<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REvoDesign | Register</title>
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="icon" type="image/svg+xml" href="/PSSM_GREMLIN/logo.svg"/>
<link rel="mask-icon" href="/PSSM_GREMLIN/logo.svg" color="#000000"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/auth-page.css">
<script src="/static/js/theme.js"></script>
</head>
<body>
<main class="page">
  <div class="nav-row">
    <a href="/PSSM_GREMLIN/dashboard">← Dashboard</a>
    <button class="btn btn-soft theme-toggle mode-auto" type="button" id="themeToggle" aria-pressed="mixed" title="Cycle theme"><span class="theme-icon" aria-hidden="true">◐</span></button>
    <a href="/PSSM_GREMLIN/login">Log in</a>
  </div>
  <div class="panel">
    <h1 class="headline">Create an Account</h1>
    <p class="subline">Register to submit and track your GREMLIN jobs.</p>
    <form id="registerForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="3–64 characters" minlength="3" maxlength="64" required autocomplete="username">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required autocomplete="new-password">
        <p class="hint">Minimum 8 characters.</p>
      </div>
      <div class="actions">
        <button class="btn btn-primary" type="submit" id="submitBtn">Register</button>
      </div>
      <div class="status-msg" id="status" role="alert"></div>
    </form>
  </div>
</main>
<script src="/static/js/register.js"></script>
</body>
</html>
