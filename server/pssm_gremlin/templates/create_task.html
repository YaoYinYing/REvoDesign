<!DOCTYPE html>
<html lang="en">
<link rel="icon" type="image/svg+xml" href="https://revodesign.yaoyy.moe/images/logo.svg"/>
<link rel="mask-icon" href="https://revodesign.yaoyy.moe/images/logo.svg" color="#000000"/>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-gray-50 text-gray-900 font-sans">
<div class="container mx-auto px-4">
<header class="flex justify-between items-center py-4">
<div class="flex items-center">
    <!-- <div class="mr-4"><svg href="https://revodesign.yaoyy.moe/images/logo.svg"></svg></div> -->
    <strong>REvoDesign: Create a new task of PSSM_GREMLIN</strong>
</div>
<nav>
    <ul class="flex space-x-4">
    <li><a href="/PSSM_GREMLIN/dashboard" class="hover:text-blue-500">Dashboard</a></li>
    <li><a href="#" class="hover:text-blue-500">Document</a></li>
    <li><a href="https://github.com/YaoYinYing/REvoDesign" class="hover:text-blue-500">GitHub</a></li>
    </ul>
</nav>
</header>

<body>
    <style>
        /* Additional CSS if needed */
        .grid-cell {
            width: 100px;
            height: 100px;
        }
        .task:hover .task-details {
            display: block;
        }
        .task-details {
            display: none;
        }
        .d-flex {
        display: flex;
        justify-content: space-between; /* Adjusts spacing between items */
        }
        body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f4;
    }

    .upload-container {
        background-color: white;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }

    #uploadForm {
        margin-bottom: 15px;
    }

    #fileInput {
        margin-bottom: 10px;
    }

    #uploadButton {
        cursor: pointer;
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        font-size: 16px;
    }

    #uploadButton:hover {
        background-color: #45a049;
    }

    #uploadStatus {
        margin-top: 15px;
    }

    </style>

    <div class="upload-container">
        <h2>Upload a File</h2>
        <form id="uploadForm" method="post" enctype="multipart/form-data">
            <input type="file" name="file" id="fileInput">
            <button type="submit" id="uploadButton">Upload</button>
        </form>
        <div id="uploadStatus"></div>
    </div>
    <script>
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var statusDiv = document.getElementById('uploadStatus');
        var formData = new FormData();
        var fileInput = document.getElementById('fileInput');
        
        if (fileInput.files.length === 0) {
            statusDiv.innerHTML = 'Please select a file to upload.';
            return;
        }

        formData.append('file', fileInput.files[0]);
        statusDiv.innerHTML = 'Uploading...';

        fetch('/PSSM_GREMLIN/api/post', {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())  // assuming the server response is text
        .then(data => {
            // Update the inner HTML of the statusDiv with the server response
            statusDiv.innerHTML = data;
        })
        .catch(error => {
            // Handle any errors here and update the statusDiv
            statusDiv.innerHTML = 'An error occurred: ' + error.message;
        });
    });

    </script>
</body>
</html>
