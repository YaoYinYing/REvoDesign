<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REvoDesign: PSSM_GREMLIN Task Submission Panel</title>
<link rel="icon" type="image/svg+xml" href="https://revodesign.yaoyy.moe/images/logo.svg"/>
<link rel="mask-icon" href="https://revodesign.yaoyy.moe/images/logo.svg" color="#000000"/>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.tailwindcss.com/tailwind.min.css" rel="stylesheet">
<style>
  /* Additional CSS if needed */
  .grid-cell {
    width: 100px;
    height: 100px;
  }
  .task:hover .task-details {
    display: block;
  }
  .task-details {
    display: none;
  }
  .d-flex {
  display: flex;
  justify-content: space-between; /* Adjusts spacing between items */
}

  
</style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
<div class="container mx-auto px-4">
  <header class="flex justify-between items-center py-4">
    <div class="flex items-center">
      <!-- <div class="mr-4"><svg href="https://revodesign.yaoyy.moe/images/logo.svg"></svg></div> -->
      <strong>REvoDesign: PSSM_GREMLIN Task Submission Panel</strong>
    </div>
    <nav>
      <ul class="flex space-x-4">
        <li><a href="/PSSM_GREMLIN/create_task" class="hover:text-blue-500">Create New Task</a></li>
        <li><a href="#" class="hover:text-blue-500">Document</a></li>
        <li><a href="https://github.com/YaoYinYing/REvoDesign" class="hover:text-blue-500">GitHub</a></li>
      </ul>
    </nav>
  </header>

  <div class="flex">
    <div class="flex-auto overflow-auto">
      <div class="taskboard">
        <!-- Task items will be generated by JavaScript -->
      </div>
    </div>
    <div class="w-64 bg-white p-4 shadow-lg">
      <div class="mb-4">
        <h2 class="font-bold mb-2">Task Summary</h2>
        <div>Total tasks: <span id="totalTasks">0</span></div>
        <div>In running: <span id="inRunning">0</span></div>
        <div>In queue: <span id="inQueue">0</span></div>
        <div>Finished: <span id="finished">0</span></div>
        <div>Cancelled: <span id="cancelled">0</span></div>
        <div>Failed: <span id="failed">0</span></div>
      </div>
    </div>
  </div>
</div>

<script>
    
  const tasks = {{ sorted_task_statuses | tojson }};
  function downloadFile(md5sum) {
    // Extract md5sum from the button ID

    // Find the task with the matching md5sum
    var task = tasks.find(t => t.md5 === md5sum);

    // Initiate download
    window.location.href = `/PSSM_GREMLIN/api/results/${md5sum}`;


}
  function cancelFile(md5sum) {
      // Extract md5sum from the button ID

      // Find the task with the matching md5sum
      var task = tasks.find(t => t.md5 === md5sum);

      fetch(`/PSSM_GREMLIN/api/cancel/${md5sum}`, {
      method: 'GET',
      })
      .then(response => response.text())  // assuming the server response is text
      .then(data => {
          // Update the inner HTML of the statusDiv with the server response
          alert(data);
      })
      .catch(error => {
          // Handle any errors here and update the statusDiv
          alert('An error occurred: ' + error.message);
      });
      

  }
  // JavaScript to handle task interactions and summary updates
  document.addEventListener('DOMContentLoaded', function() {
    const taskboard = document.querySelector('.taskboard');

    // Function to create task elements
    function createTaskElement(task) {
      const taskEl = document.createElement('div');
      taskEl.classList.add('task', 'bg-white', 'p-4', 'mb-4', 'shadow', 'cursor-pointer');
      if (task.status === 'finished') {
        var button_setting = `<button id="download-btn-${task.md5}" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-2 rounded text-xs mt-2" onclick="downloadFile('${task.md5}')"}>Download</button>`;
      }
      else if ((task.status === 'queued' || task.status === 'running')) {
        var button_setting = `<button id="cancel-btn-${task.md5}" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-2 rounded text-xs mt-2" onclick="cancelFile('${task.md5}')"}>Cancel</button>`;
      }
      else {
        var button_setting = '';
      }
      taskEl.innerHTML = `
        <div class="task-info d-flex">
          <div><strong>Task file:</strong> ${task.fasta_fn}</div>
          <div><strong>Task MD5:</strong> ${task.md5}</div>
          <div><strong>Status:</strong> ${task.status}</div>
          <div><strong>Submited:</strong> ${task.submitted_time}</div>
          <div><strong>Finished:</strong> ${task.finished_time}</div>
        </div>
        <div class="task-details bg-gray-100 p-4 mt-2">
          <div><strong>Sequence:</strong> ${task.sequence}</div>
          <div><strong>Wall time:</strong> ${task.walltime}</div>
          ${button_setting}
          </div>
      `;
      
      return taskEl;
    }
    

    // Append tasks to the taskboard
    tasks.forEach(task => {
      taskboard.appendChild(createTaskElement(task));
    });

    // Update summary counts
    document.getElementById('totalTasks').textContent = tasks.length;
    // Update other summary counts as needed
    document.getElementById('inRunning').textContent = tasks.filter(task => task.status.includes('running')).length
    document.getElementById('inQueue').textContent = tasks.filter(task => task.status.includes('queue')).length
    document.getElementById('finished').textContent = tasks.filter(task => task.status === 'finished').length
    document.getElementById('cancelled').textContent = tasks.filter(task => task.status === 'cancelled').length
    document.getElementById('failed').textContent = tasks.filter(task => task.status === 'failed').length
  });
</script>
</body>
</html>
