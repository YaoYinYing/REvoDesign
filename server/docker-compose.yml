version: "3.9"
x-common-env: &common-env
  SERVER_DIR: ${SERVER_DIR}
  DB_PATH: ${DB_PATH}
  DB_UNIREF30: ${DB_UNIREF30}
  DB_UNIREF90: ${DB_UNIREF90}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  BROKER_URL: ${BROKER_URL:-redis://redis:6379/0}
  RESULT_BACKEND: ${RESULT_BACKEND:-redis://redis:6379/0}
  NPROC: ${NPROC:-8}
  RUNNER_IMAGE: ${RUNNER_IMAGE:-revodesign-pssm-gremlin-non-root}
  RUNNER_UID: ${RUNNER_UID:-1000}
  RUNNER_GID: ${RUNNER_GID:-1000}
  USERS_FILE: ${USERS_FILE}
  LOG_DIR: ${LOG_DIR}

services:
  redis:
    image: redis:7.2-alpine
    user: ${RUNNER_UID}:${RUNNER_GID}
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis-data:/data

  web:
    image: ${SERVER_IMAGE:-revodesign-pssm-gremlin-server-non-root:latest}
    build:
      context: ..
      dockerfile: server/docker/server/Dockerfile
    restart: unless-stopped
    user: ${RUNNER_UID}:${RUNNER_GID}
    depends_on:
      - redis
    environment:
      <<: *common-env
      PORT: ${PORT:-8080}
    command: >-
      gunicorn -w ${GUNICORN_WORKERS:-2}
      -b 0.0.0.0:${PORT:-8080}
      --access-logfile ${LOG_DIR}/gunicorn-access.log
      --error-logfile ${LOG_DIR}/gunicorn-error.log
      pssm_gremlin:app
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ${SERVER_DIR}:${SERVER_DIR}
      - ${DB_PATH}:${DB_PATH}
      - ${DB_UNIREF30}:${DB_UNIREF30}:ro
      - ${DB_UNIREF90}:${DB_UNIREF90}:ro
      - ${USERS_FILE}:${USERS_FILE}:ro
      - ${LOG_DIR}:${LOG_DIR}
      - /var/run/docker.sock:/var/run/docker.sock

  worker:
    image: ${SERVER_IMAGE:-revodesign-pssm-gremlin-server-non-root:latest}
    restart: unless-stopped
    user: ${RUNNER_UID}:${RUNNER_GID}
    depends_on:
      - redis
    environment:
      <<: *common-env
    command: >-
      celery -A pssm_gremlin.celery worker
      --loglevel=info
      --concurrency=${WORKER_CONCURRENCY:-2}
      --logfile ${LOG_DIR}/celery-worker.log
    volumes:
      - ${SERVER_DIR}:${SERVER_DIR}
      - ${DB_PATH}:${DB_PATH}
      - ${DB_UNIREF30}:${DB_UNIREF30}:ro
      - ${DB_UNIREF90}:${DB_UNIREF90}:ro
      - ${USERS_FILE}:${USERS_FILE}:ro
      - ${LOG_DIR}:${LOG_DIR}
      - /var/run/docker.sock:/var/run/docker.sock

  runner:
    profiles: ["runner"]
    environment:
      <<: *common-env
    user: ${RUNNER_UID}:${RUNNER_GID}
    image: ${PSSM_GREMLIN_RUNNER_IMAGE:-revodesign-pssm-gremlin-non-root}
    build:
      context: .
      dockerfile: server/docker/runner/Dockerfile
    command: ["sleep", "infinity"]
    restart: "no"

volumes:
  redis-data:
