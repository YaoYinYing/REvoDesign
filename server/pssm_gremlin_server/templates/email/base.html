<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#ede9e3;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" role="presentation"
  style="background-color:#ede9e3;padding:24px 12px;">
  <tr>
    <td align="center">
      <!-- outer card -->
      <table width="600" cellpadding="0" cellspacing="0" role="presentation"
        style="width:100%;max-width:600px;background:#f7f5f0;
          border:1px solid #e0dbd0;border-radius:10px;">
        <!-- header -->
        <tr>
          <td style="padding:22px 24px 0 24px;font-size:18px;font-weight:700;
            color:#1a1a2e;">
            REvoDesign GREMLIN
          </td>
        </tr>
        <!-- body card -->
        <tr>
          <td style="padding:14px 24px 24px 24px;">
            <table width="100%" cellpadding="0" cellspacing="0" role="presentation"
              style="background:#ffffff;border:1px solid #e0dbd0;border-radius:8px;">
              <tr>
                <td style="padding:22px;color:#111111;font-size:15px;
                  line-height:1.6;">
                  {body}
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- footer -->
        <tr>
          <td align="center" style="padding:0 24px 18px 24px;font-size:11px;
            color:#777777;">
            REvoDesign GREMLIN Server &mdash; automated message
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
