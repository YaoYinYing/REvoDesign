<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REvoDesign | Reset Password</title>
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="icon" type="image/svg+xml" href="/PSSM_GREMLIN/logo.svg"/>
<link rel="mask-icon" href="/PSSM_GREMLIN/logo.svg" color="#000000"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/auth-page.css">
<script src="/static/js/theme.js"></script>
</head>
<body>
<main class="page auth-page">
  <div class="nav-row">
    <a href="/PSSM_GREMLIN/login" class="back-link">&larr;&nbsp;Login</a>
    <button class="btn btn-soft theme-toggle mode-auto" type="button" id="themeToggle" aria-pressed="mixed" title="Cycle theme"><span class="theme-icon" aria-hidden="true">&#9680;</span></button>
    <span></span>
  </div>

  <section class="panel auth-panel">
    <h1 class="headline">Reset Password</h1>
    <p class="subline">Choose a new password for your account.</p>
    <form id="resetForm" class="auth-form">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" class="text-input" placeholder="At least 8 characters" minlength="8" required autocomplete="new-password" autofocus>
        <p class="hint">Minimum 8 characters.</p>
      </div>
      <div class="actions">
        <button class="btn btn-primary btn-full" type="submit" id="submitBtn">Set Password</button>
      </div>
      <div class="status-msg" id="status" role="alert"></div>
    </form>
  </section>
</main>

<script>
  (function () {
    var T = window.REvoDesignTheme;
    T.initToggle(document.getElementById("themeToggle"));

    var form = document.getElementById("resetForm");
    var statusEl = document.getElementById("status");
    var submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      statusEl.className = "status-msg";
      statusEl.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Setting…";

      var payload = {
        token: new URLSearchParams(window.location.search).get("c") || "",
        password: document.getElementById("password").value,
      };

      fetch("/PSSM_GREMLIN/reset_password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
        .then(function (result) {
          if (result.ok) {
            statusEl.className = "status-msg ok";
            statusEl.textContent = result.data.message + " Redirecting to login…";
            setTimeout(function () { window.location.href = "/PSSM_GREMLIN/login"; }, 2000);
          } else {
            submitBtn.disabled = false;
            submitBtn.textContent = "Set Password";
            statusEl.className = "status-msg error";
            statusEl.textContent = result.data.error || "Reset failed.";
          }
        })
        .catch(function () {
          submitBtn.disabled = false;
          submitBtn.textContent = "Set Password";
          statusEl.className = "status-msg error";
          statusEl.textContent = "Network error. Please try again.";
        });
    });
  })();
</script>
</body>
</html>
