[build-system]
requires = ["poetry-core>=1.0.0,<2.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "REvoDesign"
version = "1.1.4"
description = "A PyMOL plugin that makes enzyme redesign tasks easier to all."
authors = ["Yinying Yao <yaoyy.hi@gmail.com>"]

readme = "README.md"
license = "GNU"
repository = "https://github.com/YaoYinYing/REvoDesign"
classifiers = [
    "Topic :: Scientific/Engineering :: Biochemistry",
    "Topic :: Scientific/Engineering :: Protein Engineering"
]

packages = [
    { include = "REvoDesign" },
    { include = "REvoDesign/**/*.py" },
]

[tool.poetry.dependencies]
python = ">=3.7"
absl-py = ">=1.4.0"
biopython = ">=1.81"
joblib = ">=1.3.2"
matplotlib = "^3.7.2"
numpy = "^1.21.6"
pandas = ">=2.1.0"
requests = ">=2.31.0"
scikit-learn = ">=1.3.0"
scipy = ">=1.11.2"


[tool.black]
line-length = 79
target-version = ['py38']
skip-string-normalization = true

include = '''
/(
  | REvoDesign
)/
'''

exclude = "REvoDesign/UI"