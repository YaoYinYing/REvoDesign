version: 2.1

executors:
  python-executor:
    docker:
      - image: circleci/python:<<parameters.python-version>> # Use dynamic Python version
    parameters:
      python-version:
        type: string
    working_directory: ~/repo

jobs:
  test:
    executor:
      name: python-executor
      python-version: <<parameters.python-version>>
    parameters:
      python-version:
        type: string
    environment:
      DISPLAY: ':99.0'
    steps:
      - checkout
      - run:
          name: Start Display
          command: |
            make setup-display
      - run:
          name: Install REvoDesign
          command: |
            make install
            make prepare-test

      - run:
          name: Run Unit Tests
          command: |
            make all-test

workflows:
  version: 2
  test-matrix:
    jobs:
      - test:
          matrix:
            parameters:
              python-version: ["3.9", "3.10", "3.11", "3.12"]


