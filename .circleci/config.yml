version: 2.1

orbs:
  codecov: codecov/codecov@5.2.1

jobs:
  build-and-test:
    parameters:
      python-version:
        type: string
      pymol-tag:
        type: string
      pymol-version:
        type: string
      conda-channel:
        type: string

      set-conda-strict:
        type: string
        default: 'echo Nope'

      pip-commands-to-run:
        type: string
        default: 'echo No pip command required, skipped.'
    docker:
      - image: continuumio/miniconda3
    environment:
      DISPLAY: ':99.0'
    steps:
      - checkout
      
      - run:
          name: Apt installs
          command: |
            apt-get update
            apt-get install -y build-essential make sudo xvfb fluxbox curl

      - run:
          name: Start Display
          command: |
            make setup-ubuntu

      - run:
          name: Setup Environment for << parameters.python-version >>
          command: |
            conda create --name REvoDesign python=<< parameters.python-version >> -y
            source activate REvoDesign
            << parameters.set-conda-strict >>
            conda install << parameters.conda-channel >> << parameters.pymol-version >> -y
            << parameters.pip-commands-to-run >>

      - run:
          name: Install REvoDesign
          command: |
            source activate REvoDesign
            make install


      - run:
          name: Run Tests against << parameters.pymol-tag >>
          command: |
            source activate REvoDesign
            make prepare-test
            make all-test

      - run:
          name: Generate Coverage Report
          command: |
            source activate REvoDesign
            coverage xml

      - codecov/upload

workflows:
  version: 2
  test:
    jobs:
      - build-and-test:
          python-version: "3.9" # https://pymol.org/
          pymol-tag: 'legacy python with pymol 3.0'
          pymol-version: "'pymol-open-source<3.1' 'pyqt=5.15' 'qt-main=5'" 
          conda-channel: -c conda-forge

      - build-and-test:
          python-version: "3.12" # https://pymol.org/
          pymol-tag: 'latest pymol open source'
          pymol-version: "pymol-open-source 'sqlite>=3.45'"
          conda-channel: -c conda-forge

      - build-and-test:
          python-version: "3.11" # https://pymol.org/
          pymol-tag: 'github/pymol-open-source'
          pymol-version: "numpy pmw=2 libcxx=19 libcurl=8 libclang-cpp15=15 libclang13=19 libgfortran5=13  libllvm15=15 libllvm19=19 llvm-openmp=19 openssl pyqt=5 qt-main=5 sip=6 xz freetype=2 glew=2 glib=2 glib-tools=2 libglib=2 libjpeg-turbo=3 libpng=1 libnetcdf=4 libxml2=2 pip 'sqlite>=3.45'"
          conda-channel: -c conda-forge
          pip-commands-to-run: "pip install git+https://github.com/schrodinger/pymol-open-source.git"

      - build-and-test:
          python-version: "3.10" # https://pymol.org/
          pymol-tag: 'latest pymol bundle'
          pymol-version: "pymol-bundle"
          conda-channel: -c schrodinger -c conda-forge

      - build-and-test:
          python-version: "3.11"
          pymol-tag: 'legacy (v2) pymol open source'
          pymol-version: "'pymol-open-source<3' 'pyqt=5.15' 'qt-main=5'"
          conda-channel: -c conda-forge

      - build-and-test:
          python-version: "3.11" # https://storage.googleapis.com/pymol-storage/installers/index.html https://anaconda.org/schrodinger/pymol-bundle/files
          pymol-tag: 'legacy (v2) pymol bundle'
          pymol-version: "'pymol-bundle<3' 'sqlite>=3.45'"
          conda-channel: -c schrodinger -c conda-forge
          
